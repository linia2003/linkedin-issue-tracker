<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
      <!--fontawesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
        <!--talwind+daisyui-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white min-h-screen flex items-center justify-center font-['Geist']">
     <!--login part-->
      <div id="login-page" class="w-full max-w-[500px] p-8 md:p-12 bg-white rounded-lg">
        <div class="flex flex-col items-center">
            <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-20 md:w-28 mb-8">
            
            <h1 class="text-2xl md:text-3xl font-bold text-[#1e293b] mb-2 text-center">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-base md:text-lg mb-10 text-center">Sign in to manage your issues</p>
        </div>

        <div class="space-y-6">
            <div class="form-control w-full">
                <label class="label p-0 mb-2">
                    <span class="label-text text-lg font-medium mt-1 text-gray-800">Username</span>
                </label>
                <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full h-14 text-base focus:outline-none focus:border-[#4a00ff] bg-white" />
                <p class="text-[#4A00FF] text-sm font-regular ">Default: admin</p>
            </div>

            <div class="form-control w-full">
                <label class="label p-0 mb-2">
                    <span class="label-text text-lg font-medium mt-1 text-gray-800">Password</span>
                </label>
                <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full h-14 text-base focus:outline-none focus:border-[#4a00ff] bg-white" />
                <p class="text-[#4a00ff] text-sm font-regular">Default: admin123</p>
            </div>

            <button onclick="handleLogin()" class="btn w-full h-14 mt-4 bg-[#4a00ff] hover:bg-[#3d00cc] text-white text-xl font-semibold border-none capitalize shadow-md">
                Sign In
            </button>
        </div>
    </div>
 <!--dashboard-->
    <div id="main-dashboard" class="hidden min-h-screen bg-gray-50 w-full">
        <nav class="bg-white border-b border-gray-200 px-4 py-3 flex flex-col md:flex-row items-center justify-between sticky top-0 z-10 gap-4">
            <div class="flex items-center gap-2 ml-0 md:ml-4">
                <img src="./assets/github-logo.png" alt="Logo" class="w-8 h-8">
                <span class="text-xl font-bold text-gray-800 tracking-tight">GitHub Issues Tracker</span>
            </div>
<!--search parts-->
            <div class="flex items-center gap-3 w-full md:w-auto mr-0 md:mr-4">
                <div class="relative flex items-center flex-grow md:flex-grow-0">
                    <div class="absolute left-4 flex items-center justify-center pointer-events-none z-20">
                        <i class="fa-solid fa-magnifying-glass text-[#64748b]" style="font-size: 0.875rem;"></i>
                    </div>
                    
                    <input 
                        type="text" 
                        id="search-input"
                        onkeyup="handleSearch()"
                        placeholder="Search issues..." 
                        class="input input-bordered w-full md:w-64 h-10 pl-11 bg-white text-sm focus:outline-none focus:border-[#4a00ff] placeholder:text-gray-400"
                    />
                </div>
                <!--new issue part-->
                <button class="btn btn-sm h-10 px-4 bg-[#4a00ff] hover:bg-[#3d00cc] text-white border-none normal-case">
                    + New Issue
                </button>
            </div>
        </nav>

        <div class="max-w-[1200px] mx-auto p-4 md:p-8">
            <div class="flex flex-wrap items-center gap-2 md:gap-4 mb-8">
                <button onclick="filterIssues('all')" class="btn btn-md flex-1 md:flex-none px-10 bg-[#4a00ff] hover:bg-[#3d00cc] text-white border-none rounded-lg">
                    All
                </button>
                <button onclick="filterIssues('open')" class="btn btn-md flex-1 md:flex-none px-10 bg-white hover:bg-gray-100 text-gray-500 border border-gray-200 rounded-lg">
                    Open
                </button>
                <button onclick="filterIssues('closed')" class="btn btn-md flex-1 md:flex-none px-10 bg-white hover:bg-gray-100 text-gray-500 border border-gray-200 rounded-lg">
                    Closed
                </button>
            </div>

            <div class="bg-white border border-gray-200 rounded-xl p-6 mb-8 flex flex-col md:flex-row items-center justify-between shadow-sm gap-6">
                <div class="flex items-center gap-4 w-full md:w-auto">
                    <div class="p-3 bg-gray-50 rounded-full">
                        <img src="./assets/Aperture.png" alt="Aperture" class="w-8 h-8 bg-[#ECE4FF]">
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-[#64748b]"><span id="issue-count">0</span> Issues</h2>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-6 w-full md:w-auto justify-center md:justify-end border-t md:border-none pt-4 md:pt-0">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-[#00a96e]"></div>
                        <span class="text-gray-700 font-medium">Open: <span id="open-count">0</span></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-[#a855f7]"></div>
                        <span class="text-gray-700 font-medium">Closed: <span id="closed-count">0</span></span>
                    </div>
                </div>
            </div>

            <div id="issue-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </div>
    </div>

    <dialog id="issue_modal" class="modal">
        <div class="modal-box bg-white max-w-2xl">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <div id="modal-content">
                </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
